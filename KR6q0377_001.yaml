body:
  text: 豫章參學門人文智編皇宋景祐四年丁丑歲十月初三日知郡待制范公躬率四衆就芝山迎師歸本院師升堂據座不語安國長老乃白衆云當觀法王法法王法如是衆猶不退師云安國和尚適來已是郎當不少老僧不可向土上加泥大衆更莫久立便下座是日晚參僧問法不孤起仗境方生學人上來請師垂示師云金剛草鞋進云恁麼則退後三步師云酌然千萬里問人天交集四衆臻臨如何是和尚為人底句師云淥水泛清波學云點師云過學人撫掌師云退問一喝分賓主照用一時行此意如何師云乾柴濕䉰學人便喝師云紅焰炎天復云衲僧相見不涉言詮爭奈俗士在筵又須開一線道然雖如是且作麼生辨明直饒見得諦當分明在俗士分上即得衲僧分上天地懸殊大衆作麼生是衲僧分上事試道看莫道錢是足陌莫道地肥茄子懶若作此見解與俗何殊若不然者且作麼生是衲僧分上事久參先德不在言之後學初機直須子細不勞久立珍重檀越請晚參僧問青青翠竹盡是真如黃花無非般若如何是般若師云黃泉無老少進云春來草自青師云聲名不朽進云若然者碧眼胡僧也皺眉師云退後三步學云苦師云吽吽問人天普集佇聽雷音學人上來請師垂下師云光陰似箭進云一言才剖人皆委香煙起處盡沾恩師云古人有言學人便喝師云瞎學云放過一著師云人天大衆前放你三十棒師乃云自從行腳以來未曾似今歲被人逼令住院開堂作長老此是衲僧第一不著便處從今以去被人喚作長老或喚作善知識大似被他劈面唾相似又被俗士請令晚參不免為他説佛説法或則毀佛謗法可謂剜肉作瘡笑破衲僧口諸多俗士也須抖擻精神莫受塗糊指注日晚各請歸家珍重上堂僧問一人探頭一人下喝此二人相去幾何師云三更半夜進云龍歸滄海鳳反丹山師云北斗下燒香問臨濟竪拂學人起拳是同是別師云訛言亂衆進云恁麼則據令而行也師云天涯海角學人便喝師云吽吽問曲調已成還許學人斷和也無師云官不容針進云果是伯牙才師云自家看取學人撫掌三下師云三十棒師云衲僧面前難為啓口假饒發一言直得天雨四花地搖六震須彌倒卓海水沸騰猶是野狐精業然雖如是也須見到始得若也於此不明便見物類千差自他能所愛憎嗔喜生死遷流所以古德云努力今生須了却莫教永劫受餘殃至初九日開堂范公自作請疏云伏以無心為宗非一毫之可立有言即病徒萬法之強名然則病非醫而曷求宗因師而乃證古師和尚淨行無垢孤風絶攀法鼓一鳴有聞皆聳神珠四照無隱不彰群願斯歸正乘可示大衆瞻仰即同如來謹疏龍圖閣待制知饒州軍州事范仲淹疏讀疏畢師告衆云山僧蒙郡侯堅命此日可謂脫珍御服著弊垢衣大似國家兵器不得已而用之便升座拈香云且道這一瓣香為甚麼人山僧初行腳時先參見大光敬玄和尚這和尚坐在荒草裏後參見南嶽福嚴寺良雅和尚這和尚又只是箇脫灑底衲僧這一瓣香不為大光和尚亦不為福嚴和尚大衆記取唯有韶州雲門山匡真大師稍較𬅿子這一瓣香且為雲門山匡真大師燒也於是趺坐維那白槌云法筵龍象衆當觀第一義師云大衆維那如是咨白大衆還甘也無何以若據大衆分上假饒諸佛出世猶是自謾祖師西來誑惑庸小自餘之輩不在形言若也談玄説要大似含血噀人問答往還如同魔嬈禪德大衆面前作麼生下口然雖如是事無一向理出百途曲為下機有疑請問僧問猿抱子歸青嶂後鳥銜花落碧岩前此是夾山境那個是薦福境師云莫進云如何是境中人師云莫問知師久蘊囊中寶今日當筵略借看師云莫進云豈無方便師云莫問大善知識出世將何為人師云莫進云恁麼則有問有答去也師云莫有僧才擬伸問師云問話且止直饒問得答得與道懸殊大衆似此問話數箇闍黎總未有箇出家眼目在若有出家眼目一萬里外聞有善知識出世洗耳攢眉拂袖遠去爭肯來這裡五體投地問箇如何若何仁者還知道大衆各各自己分上是箇甚麼門風是箇甚麼體格直得諸佛仰望不及天下祖師鎖口有分若能如是明見得佛之與祖如同夢幻空花聞甚深法門也似風聲谷響自己頴脫獨拔猶間法界有情齊成正覺豈不是大丈夫漢豈不是真出家兒是事且置以某纍德不高向道非遠雲山遁迹歲月隳顏伏承知郡待制提點度支諸位官僚寵錫文疏令開堂演法所生均祉上祝今聖皇帝山嶽為壽日月齊明文武官僚高登祿位諸院尊宿僧正名員洎諸檀信元相輔會敢緩敷宣久抑尊官伏惟珍重上堂自從入院諸多俗士請令晚參只可隨時施設俯就機緣若據山僧見處自是一家何以為早歲遊方參見第一等尊宿或則舉經舉論説色説空三界唯心萬法唯識乃得天地同根萬法一體卷舒萬象縱奪森羅諸事摐然一切成現或説向上關棙透過法身言無展事語不投機承言者喪滯句者迷於斯明得便是箇灑灑地衲僧不依倚一切純説乾嚗嚗地禪凡有問來更不答話或説全體作用法令雙行主賓縱奪照用縱橫三年內一時被老僧參得以為祖道真規後來自家破總是鬼解螢光上祖門中以為毒藥如今四海大行所以祖席荒涼道流閴爾仁者直須著忖莫受塗糊但據當人事是何道理珍重上堂口是招禍之門舌是伐身之斧若有衲僧出來將老僧拖下禪床爛毆一頓豈不是與衆雪耻也許你具一隻眼如今擬在這裡叉手立地𮞏相鈍置有甚麼了期珍重衆會齋上堂如來正法眼藏涅槃妙心祖祖相傳佛佛授手凡聖平等不假外求萬德圓明豈勞修證山僧此日覿面相呈悟之便登佛地不歷階梯迷之背覺合塵枉入諸趣迷悟自有差殊此法本無增減久參達士同共證明後學初機有疑請問僧問承和尚有言覿面相呈如何是覿面相呈事師云莫進云喏師云莫進云喏喏師云莫莫有僧才擬伸問師云問話且止與道懸殊若據諸人分上具無礙辨尚沒奈何擬心則差豈況更形言語衆生流轉不息蓋為有心若得一念心不生與佛齊肩定矣天上天下絶是最尊巍巍堂堂十方獨步隨機赴感靡所不周故號無緣之慈亦云不請之友未得如此墮在邪途珍重上堂鼓聲才動大衆已集却令山僧無下口處莫怪古人道十度擬發言九度却休去何以假饒説得擲地作金聲在諸人分上了無交涉大衆欲得親切麼自家道取諸人作麼生道未開口以前却較𬅿子才開口皆是自謾莫見恁麼説了便出頭來禮三拜或揚眉瞬目拂袖出去或則下棒下喝轉沒交涉除此外作麼生道這裡若道得亦不虗出家行腳方能紹隆三寶若道不得直須出家珍重師早參示衆云大衆霜寒不勞久立珍重結夏日上堂止持作犯為初機禁足規繩則可知若是吾曹門下客林間相見不揚眉上堂大衆雲門匡真大師如今現在諸人還見麼若也見得便是山僧同參見麼見麼此事直須諦當始得不可自謾且如往古黃蘗聞百丈和尚舉馬大師下喝因緣他因茲大省百丈問子向後莫承嗣大師否黃蘗曰某雖識大師要且不見大師若承嗣大師恐喪我兒孫大衆當時馬大師遷化未得五年黃蘗自言不見當知黃蘗見處不圓要且只具一隻眼山僧即不然識得雲門大師亦見得雲門大師方可承嗣雲門大師只如雲門入滅已得一百餘年如今作麼生説箇親見底道理會麼除是通人達士方可證明眇劣之徒心生疑謗定矣見得者不在言之未見者如今看取不請久立珍重上堂大衆朝晚雖然聚集且無言句教諸人領解亦無言句教諸人參亦無門風教諸人施設只是與諸人揀擇邪正免諸人取次承當未得謂得緣祖道門中沒量大人容易領解且如往日親見雲門尊宿具大聲價莫若德山密洞山初智門寬巴陵鑒他雖親見雲門只悟得雲門言教要且不悟道見性何以知之且如僧問鑒和尚云如何是提婆宗鑒云銀碗裡盛雪又問如何是吹毛劒鑒云珊瑚枝枝撑著月又問佛教祖教是同是別鑒云雞寒上樹鴨寒下水鑒和尚云我下此三轉語已報雲門恩了也後來更不與雲門設忌齋大衆雲門分明道此事若在言句一大藏教豈無言句又云饒你問得答得只贏得口滑去道轉遠作麼生下三轉語便道我報雲門恩了也可謂埋沒上祖錯指後人遂使兒孫承空接險從錯至錯例皆稱提言句以為向上極則事大衆若據言句中事如螢火之光諸人分上如百千日月大衆曾於言句中得入者快須吐却於自己分上點撿看是何道理珍重上堂云瘥病不假驢駝藥便下座上堂彼此出家人且作麼生是出家眼如未具出家眼且依佛了義教莫依不了義教如何是不了義教談因説果有聖有凡福慧二嚴闕一不可此為對盲俗説為他不知有出世之道且令修禪學慧免他失却人天二路若是我沙門釋子不可依從被福慧繫在生死界中如長繩繫鳥足無有脫期如何是了義教福不可作慧不可修只要諸人見性悟道若要見性悟道一切佛法不可學三乘聖行不可修福不可作慧不可學所以道一切無心道合同自己一身解脫猶間法界有情齊成正覺亦能攪長河為酥酪變大地作黃金乃至十方世界皆成珍寶也則不難何必勞神結緣作福莫怪説如此事山僧早年行腳所見尊宿皆言我不答話純説乾曝嚗地禪又云福慧不可闕後來得破了洎合被他賺過一生所以山僧在衆裡不教人學佛學法不教人作福結緣然雖如此百千人中無一人肯信為他無出家眼根器淺薄信之不及所以佛云薄福鮮德人不堪受是法聞必不敬信若信得及紹隆得三寶一切衆生皆有解脫之期若信不及永劫受殃莫言不道珍重上堂初心後學還得出家也未若也未得出家且須持取齋戒如何是持齋戒擬心是破戒得味是破齋剎那闕漏大難出家珍重上堂三世諸佛出現世間讚歎諸人不及山僧若更開示指南大似壓良為賤然雖恁麼道只如大衆有甚麼長處知得麼撿點看不請久立珍重上堂行腳人面前説箇甚麼即得何以十語九中不如一默然雖恁麼道大似斧斫了手摩抄若更待山僧開口可謂灸瘡瘢上更著艾炷各自下去上堂曹溪路上即不問且道兜率內院慈氏如來共文殊對談何事還見麼還聞麼直饒親見親聞猶是兜率內院事且道曹溪路上作麼生試道看莫道是久雨蔞蒿長莫道春來草自生若據如此正是鳥道羊腸未夢見曹溪路上在久參先德不在形言後學初機切須子細不請久立珍重施主設齋上堂欲知佛性義當觀明節因緣且如今日勝會是事摐然一切成現且道成得箇甚麼邊事要會麼法本不然豈其然乎於斯了得便是海印發光到此不明可謂塵勞先起奈何法本無私見有差別譬如諸天共寶器食隨其福德飯色有異仁者見之謂之仁智者見之謂之智出家人見之是箇甚麼儻明此理乃可取食若昧斯宗難為消受已得者不在言之未得者快須了取珍重上堂大衆諸人從無始以來至于今日有箇甚麼事還知麼三世諸佛向十方世界覔諸人不得六道四生亦覔諸人不得三乘聖位尚亦覔諸人不得擬喚作一物又不堪説似一物又不得不禁何了道不可以智知不可以識識然雖如此亦是名邈雕鐫與諸人分上天地懸隔諸人既若此此何用參請何假修行當下便休猶是鈍漢若是擬議自欺珍重上堂大凡參學但且扣己而參體取本來無一物體取目前亦無一物一一體取了表裏盡情己見亦亡便謂之忘己之士所以古人道而今天下忘心能幾人如此之人最難得千人萬人學無一人兩人得未得如此但且忘心息見如愚如癡一二十年守取一悟珍重上堂出家人論實不論虗所以佛云既得出家如囚免獄少欲知足勿貪世榮忍飢耐渴志存無別事也珍重上堂道泰不傳天子令時清休唱太平歌珍重上堂去去西天路迢迢十萬餘珍重上堂衲僧面前有甚麼相瞞處直饒説得天花亂墜爭似靈龜未兆時設使釋迦掩室於摩竭蓋為下根下器淨名杜口於毗耶不肯直饒不肯也是狐假虎威下座上堂大衆山僧今日將三世諸佛所説之法一時舉似大衆了也更不欠少一字不得嫌山僧急性蓋緣俯為下機直饒仁者於一言下得諦當分明説得如雲如雨咄這喫野狐唌唾底餓鬼莫向衲僧門下過打公腰折莫言不道下座上堂諸仁者一等參學且須辨取是非若也取次承當便是一生虗過近來行腳人例皆以天台華頂南嶽石橋將為向上一路多少錯認此是暫時行履處非究竟安身立命之地又説徐州麥飯鎮州大蘿蔔頭以為灑灑地衲僧千足萬足莫錯承當此是非時之食誘引童蒙止啼之義在衲僧分上謂之雜毒食若也未得其趣更莫沾唇若已得其趣快須盡底吐却儻有纖毫在心便是虗生浪死珍重上堂除非休去便休去若覔了期無了期參上堂諸上座行腳當為何事若要知見明白了達世出世法多知解會問答與天地同根萬法一體認得法身法性速往諸方學取若要透過法身會得向上關棙言無展事語不投機凡有問來更不答話做箇灑灑地衲僧不依倚一物亦請速往諸方學取直饒一一見得與諸人本分事了無交涉所以老僧只以本分事接人若是諸方有語句文字教諸人用心學得若是山僧此間不立文字語句用心學不得無你捿泊處四方學者望涯而退若要見本分事便須一切佛法不用學一切言句不要參罷却學心忘却知見如枯木石頭有少相應之分若不如是與道懸殊珍重上堂良久云劒去遠矣徒勞刻舟珍重上堂三世諸佛仰望不及天下祖師結舌有分知有者善自保任未知有者不休何待參上堂丈夫各有沖天氣莫向如來行處行向甚麼處行即是諸仁者出來對衆道看莫道是趙州南石橋北莫道是天台華頂華嶽三峯莫道是人無遠慮必有近憂若據如此見解大似猛虎入穽俊投籠自取滅亡非他人咎且道作麼生是衲僧行處珍重上堂大衆昨日施主齋會僧道威儀濟濟俗士禮樂鎗鎗供養摐然香花羅列如此一筵勝事且道今日甚麼處去也若知得來處即知去處方不被因果所拘於諸法中而得自在汝若向刀山刀山自摧折汝若向火湯火湯自消滅方能放蕩逍遙有何罣礙若也未了萬法所拘無由解脫可謂業識忙忙觸途成滯若遇惡境現前如何消遣古人道努力今生須了却莫教永劫受餘殃珍重上堂良久大衆不散師云做甚麼不可須待惡水潑那下去上堂舉百丈恆和尚有時上堂衆才集云喫茶便下座有時上堂衆才集云珍重便下座有時上堂衆才集云歇便下座往往常用此時節因緣衆人罔測津涯後來恆和尚作一頌頌此三轉因緣云百丈有三訣喫茶珍重歇直下便承當敢保君未徹師云大衆只如恆和尚作此一頌且道見處如何還知得失否要會麼據它三度上堂時節恰似箇好人後來作此一頌恰如面上雕兩行文字若是通人達士舉起便知後學初機難為揀辨老僧與汝從頭注出百丈有三訣賊身已露喫茶珍重歇贓物出來直下便承當敢保君未徹大似抱贓判事然雖如此諸仁者若具擇法眼方能證明如或邪正不分可謂瞞頇佛性更須博問賢良可惜虗生浪死珍重因臻和尚大祥齋次上堂古人道相識滿天下知心能幾人知心且置還端的識得天下人也無如臻和尚遷化已得二年我道如今現在識得麼若也識得臻和尚非但天下乃至三世諸佛一切賢聖只向這裡一時識得見得還見得麼直饒一時見得識得在衲僧分上也只是螢火之光然雖如是亦須是見到始得何以若也不明此旨便有聚散離別之憂生滅斷常之見珍重上堂古人道無邊剎境自他不隔於毫端十世古今始終不離於當念只如山僧恁麼道廬山五老峯還聞也無趙州石橋何不出來通箇消息直饒你出頭來也是猢猻繫露柱不請久立珍重上堂三世諸佛亦如是一切聖賢亦如是大衆亦如是山僧亦如是且道是箇甚麼只有照壁月更無吹葉風珍重上堂祖師門下故是不容衲僧面前是何道理然雖如是知恩者少負恩者多參上堂大陽門下不假然燈衲僧面前那堪開口所以釋迦掩室達磨緘言若到薦福門下放過則不可扣禪床一下參上堂焉敢觸忤上流蓋緣曲為下機然雖如是圖他一粒米失却半年糧參上堂虗空無內外心法亦復爾若了虗空故是達真如理此是上祖家風後來兒孫不能繼嗣蓋緣易會難見舉了便會了謂之隨語生解亦謂之依通亦謂之子解會不是親證親悟所以疑情不息蓋為無本可據業識忙忙自生異見云我不入這解脫深坑又云向這法界走有甚麼了期何不覔箇出路裏又云自有向上一格事或云自有透脫一路如何是透脫一路王字鑰匙賓鐵打或云驢揀濕處尿或云春草緑濛濛將上祖門風却稱提言教以為極則謂之輕心重教棄本逐末如犬趂塊百十年來例皆如此雪峯和尚云祖師滅了也被你而今人埋在荒草裡若於上祖門風得入如百千日月度盡法界一切衆生若於言教中得入如螢火之光自救不了何以乾慧不免若轉諸仁者一等是學離却文字知見參取自己事所以佛教祖教如生冤家始有少許相應分且道作麼生是相應底事珍重上堂鼓聲才動大衆皆集直得三世諸佛異口同音為諸人演唱可謂法無不周義無不備事無不顯理無不彰諸人還見麼還聞麼若見現在諸佛若不見未來諸佛則法有斷常佛有生滅云何佛言一切法不生一切法不滅若能如是解諸佛常現前然雖如是須是見到始得不取汝口頭辨學之不成須是悟之於心形之於言故云如證而説一言一句是真語實語如語不誑語不異語若也見不到凡有所説是大虗妄自誑誑他爾後拔舌犂耕定矣此之法門在祖師門下雖是淺近知見出家人若見不到謂之生盲生聾華嚴會上判為餓鬼雖在河邊而不見水設有見者皆成猛火或為膿血何以是諸人分上事全在日用中若也見得全同諸佛無漏智用若也不見便是凡夫顛倒妄想故云醍醐上味為世所珍遇斯等人翻成毒藥外為聲色所衒內為見聞所惑可謂業識忙忙如何報答四恩雖然學得佛邊事亦是行腳人錯用心豈況世間之法一朝四大相違悔將何及出家人受父母返拜人天瞻敬不達出世道可謂虗沾信施濫膺恭敬莫教閻老斷自己意如何參上堂行腳人面前難為啓口説箇不於佛求不於法求不於僧求俯為脫白行者直饒毀於佛謗於法不入衆數猶是祖師門下掃灑之徒直饒坐斷世界函蓋十方身相圓容互為主伴該羅萬有周遍含容雖是圓宗極唱祖師門下以為弄影之徒是故老僧云三世諸佛仰望不及天下祖師結舌有分諸仁者若肯未具行腳眼在若也不肯亦未具行腳眼且道作麼生是行腳眼參上堂夫出家人為無為法無為法中無利益無功德近來出家人貪著福慧與道全乖若為福慧須至用心若要達道無汝用心所以常勸諸人莫學佛法但自休心利根者畫時解脫鈍根者或三五年遠不過十年若不悟道老僧與你入拔舌地獄參上堂大衆夏將欲末空劫以前事還得相應也未若也未得相應爭奈永劫輪回何有甚麼心情學他佛法廣求知解被知解風吹入生死海若是知解諸人過去生中總曾學來多知多解説得慧辨過人機鋒迅速只是心不息與空劫以前事不相應因茲惡道輪回動經塵劫不復人身如今生出頭來得箇人身在袈裟之下依前廣求知解不能息心未免六趣輪回動經塵劫何不休心去如癡如迷去不語五七年去以後佛也不奈你何參上堂佛佛授手祖祖相傳善自護持無令斷絶參上堂此來法歲將滿且喜大衆安樂自慢院門寂寞更希以道為懷然出家人終不以利養為務故云出家弘聖道誓度一切人古者為三緣故出家第一為自己輪回生死二為紹隆三寶令佛法久住世間三為六道四生皆令解脫所以割愛辭親棄其榮貴乃至捨國城妻子象馬七珍出家弘道此之三緣是出家人重任出家人分上事餘人不能成立看見近來出家人那箇憂著自家道力不充忘機息見那箇欲紹隆三寶如實而修那箇欲誓度有情不惜身命若不為此三緣出家無益可謂上負四恩下辜三有設欲自利利他須會修行始得若也用心修行或則墮在邪宗或入三乘聖位皆非究竟所以常勸諸人且於空劫以前體取當人自會修行去若要體取空劫以前自己事直須休心若得無心輪回永斷若得無心即是佛佛即是法法佛和合名為僧當體即是常住三寶虗空有變此法常存故知無心方能延得佛法壽命若得無心照見法界衆生齊成正覺度一切有情於修行門中休心最為第一所以三世諸佛皆於無心路上方得見性任你經三無數劫修六度萬行終不見性若得無心始得悟道故知無心是三世諸佛所行徑路今時出家人莫學佛法但學休心即是行諸佛路參上堂此來法歲已圓諸上座若到諸方有人問薦福和尚如何上座作麼生通吐莫道庚午生人今年七十一麼莫是道行時腳踏地坐時頭戴天麼莫是道或則説佛説法或則毀佛謗法或時為人解纏縛去粘膩成箇灑灑地衲僧不依倚一物麼莫是道恁麼也不得不恁麼也不得莫是無你下口處麼莫是道問聲未了欄腮硬掌拂袖便行麼若如此通吐總未見老僧在且作麼生通吐若見得老僧對衆道看良久云對衆若道不得忽到諸方莫道見老僧來珍重小參語録師因入室次云日來為兄弟説話次見他説箇唯心底道理説得一一總是真箇説得理構十分恰到問著他方世界事總説不得當知即是意會諸上座此箇事須是悟始得若是他悟底人吐露箇消息也自不同你意會底人説話有甚麼交涉不見水潦和尚問馬大師云如何是祖師西來意馬大師欄胸一踏倒水潦從地起來忽然大省云萬象森羅百千妙義只向一毫端上便識得根源體性去看他悟底人吐露箇消息直是不同諸上座有時見兄弟來説箇道理圓陀陀地及乎問伊他方國土事並不知諸仁者古人分明向你道三界唯心萬法唯識何得不會又云諸法所生唯心所現乃至日月星辰森羅萬象皆不出你自心諸仁者何不將每日緣馳世間雜事底身心體究取這般事諸上座此箇法門却許你用心體究得何以故此不是道最是箇淺近底法門多見兄弟見得這般事了便休去暨箇甚麼在然雖如是出家人若此事不明去他出家大遠在若覷得此事身心也自然漸得停息何以不被外境所惑若是得悟入底人説甚他方世界事乃至三世諸佛一切聖賢總向這裡識得見得三世諸佛所説之法總向這裡見得未説之法亦向這裡見得見麼見麼所以云門和尚云南有雪峯鼓山盤山和尚北有五臺文殊趙州和尚諸人要識麼只向這裡識取見麼諸仁者是箇甚麼道理此事千經萬論説得多少分明須是用心體究始得然雖如是假饒悟得識得向衲僧分上還得也無只作得箇祖師門下掃灑沙彌童行若望衲僧天地懸殊所以雲門和尚云直饒捻一毫端盡大地一時明得衲僧門下天地懸殊諸仁者且道衲僧具甚麼道理還委悉也未所以有時常勸兄弟自己事如未明白且莫學佛法不怕總不會去則恰好無你用心處無你強為處況老僧這裡説得話且與你諸方不同兼也淡泊無滋味無可咬嚼至今難得兄弟千人萬人中覔無一人肯若是見他肯底人終不要人説才知有此事直下便休更不與你打交涉心如鐵石去此是本分衲僧不挂唇吻那裡與你一問一答他自知無益任運如此終不強為有時見參學兄弟皆言為生死事大總擬學此事那裡學得成學著轉遠去無非是息心若一念心息更學甚麼道無心即是道若擬用心學道有甚交涉所以古人道忘機即佛道隆分別即魔軍盛諸兄弟若肯去但學休心別無學處從上佛之與祖皆從息心而證出三界如今諸兄弟若一念不忘六道輪回動經塵劫總未保在何以無始以來至于今日只為你這一念心不歇所以不與道相應諸兄弟如今既得在袈裟之下快須努力自家著眼看是箇甚麼道理今時學者例皆於言句曉夜用心與道相乖如今諸兄弟但學休心不取你口頭辨直須如愚如癡去似初從胞胎中出來相似第一莫記一箇字在心始得今時學人不似他古人才知如是便恁麼去一向如寒灰死火枯木石頭去你如今人並不以此為事如何得大事相應諸兄弟若肯去便恁麼行持若不肯如今諸方禪道興盛急去學取抄取我這裡無可與你把捉亦無一言半句與諸人作解會只是與諸人揀擇邪正免諸人墮在邪見中有時常苦口勸諸兄弟大事未辨且莫錯用心且體取空劫以前事直須是休心去如今教你諸人休歇去也是大難底事此也須是上根上器底人始得如今若有一人肯恁麼休歇去老僧堪伏事他只如千人萬人中無一人肯諸上座若有一人肯恁麼去不消你五生七生便能度得法界一切有情亦能化身五億同時於微塵剎土世界隨所化現度脫一切衆生恁時也不消得你開這兩片皮為他説法有情衆生合聞法者自然聞法當時解脫豈不是出家人及事處然雖如是用心學不成皆是息心自然得底事如今若有一人忘心息見去可以延得佛法壽命令佛法久住世間後人也有可依倚也令他學道人知有正因且如老僧自前在衆裡三四十年到處尊宿會下例皆推窮言句或説照用縱橫後來自家覷得破了如此之類在衲僧分上謂之雜毒食險被賺過一生所以老僧在衆裡不教兄弟學事縱有知見解會到這裡切須淨吐却始得若有纖毫在心便是虗生浪死諸仁者一等是學更莫有疑這裡説話必不相誤直如一息不來底人始得直如一塊頑石頭去始得諸上座你見頑石頭麼有甚麼解會出家人若不如此擬學佛法天地懸殊如此出家有甚麼利益自救不得爭能利益他人若據諸人自己本分事焉教老僧説得著生心動念自乖法體各各本有底事一切具足不少欠一法又更來老僧這裡叉手立地要和尚為我説他古人那裡如此為人經冬過夏無一兩度上堂是他兄弟知有底亦不要他人説自會行持此謂之休心上士歇意高人堪為佛種諸仁者此非小緣莫非他知有從上來底人方能如是傲慢之徒難為成立任你學得八萬法門百千三昧總不濟事所以道乾慧不免苦輪到這裡不取你口頭辦諸上座更莫諸餘老僧勸你不如休歇去但十二時中一切無心去如愚如癡去諸仁者從他人道你自辦大事莫管他人長短是非一切時中東西不辨觸淨不分甚後佛也不奈你何老僧雖然與諸人説多少自瞞明眼人看見是甚麼道理然雖如是未免拖泥涉水為諸人説路布假饒你聞老僧一言便大省悟去還當諸人自己事也無總未識得情識意會在皆是言句中作活計與你自己本分事了無交涉如棄百千日月以著螢火之光莫怪説如此事是為諸人諸人聞老僧如是説了合作麼生還信得及麼若信去便恁麼行持所以古人道此之一學最妙最玄但辦肯心必不相賺若不信去光陰虗度浪死虗生蓋為諸人根機淺薄信之不及如今諸上座但且如是參所以雲居和尚云若謀恁麼事須是恁麼人既是恁麼人何愁恁麼事珍重師入室良久云諸人如今便散去多少省徑既不散去須要老僧這裡説既開口為諸人説著堪作甚麼若據諸人分上更少欠箇甚麼從無始以來常與諸佛齊肩更擬學箇甚麼只為諸人強生異見自作艱難被名相二字所惑聖凡名號三世諸佛八萬法門百千三昧有佛有衆生總謂之名相若離却名相二字更有箇甚麼本來無物可得只為諸人起心動念妄有生滅妄有菩提涅槃便有出世間法不出世間法妄起許多異見棄却十方虗空却向鬼窟裡作活計本來是佛不假你修行既然如此更擬學箇甚麼去總要離却衆生修行覔佛佛在那裡只諸人自己便是佛悟之即是佛迷即是凡夫所以云平等真法界無佛無衆生然雖如是體究不得修行不得此是修不得底事無過是諸聖經三無數劫修行直至十地滿心説法如雲如雨尚不能得見性忽爾無心方始見性却觀以前三無數劫枉用工夫虗受勤苦修行總無實事當知不假你修行總無你用心學到你用心學著無有是處若多知多解能問能答説得道得機鋒迅速慧辨過人似這般事諸人過去生中總曾學來只是免輪回生死不得為箇甚麼為你不曾見性悟道所以生死不斷從生至老只是識得箇門頭戶口光影為身不知有本來自己不知有向上一路事却於文字語言上學問學答有甚麼交涉三册五册抄取記取到處尊宿會下經冬過夏一一從頭請益便説向上向下照用縱橫做箇灑灑地衲僧不依倚一物道我己事明白也蘊在胸襟以為極則遂乃欲人稱我是禪師為後人開眼目多少埋沒上祖錯指後人將這般事擬抵他生死還得也無縱你便得大省大悟説得如雲如雨去只是贏得一場口滑去道轉遠喚作貪相淫底婦人所以德山和尚云一𮞏一口淫得來滑喥喥地有箇甚麼益亦喚作野狐精魅諸仁者當知此事不在你擬議思量直下是箇出家人始得那裡教你容易行止取次身心學得從上諸聖具無礙智搆不及底事那裡在你一問一答直饒一言一句便得天花亂墜亦不干自己事況你據見定有𬅿箇知見便為自己見解參學事畢千足萬足耽箇勝負身心到處覔人道我會禪會道騁智騁強道我是祖師門下客似此之流總喚作野狐涎唾餓鬼外道之輩是甚麼學佛法人近來參學兄弟便是一代不如一代並不知出家本分事總要學對口又怕人問著無可祗對一向在言句中留心十年二十年止在鬼窟裡作活計不知有本分事據他學解機智不妨也多知能解解問解答了達得世間之法只是於生死門庭中總不得力行腳人學得這般事濟箇甚麼臘月三十日不免被知見風吹入生死海裡有甚麼了期諸仁者丈夫各負沖天氣作麼生却向這裡自埋自沒此事蓋緣初心不正亂被人指示教你恁麼是恁麼又不是至竟未曾遇著好人你這一箇自己本性猶如空中無形無相作何面孔你擬做箇甚麼見得他那裡教人指示得著從上三世諸佛具五眼六通尚見不得不曾識伊面孔無始以來至于今日未曾生未曾滅未曾有未曾無只為你迷來日久妄有生滅妄有輪回便見法有斷常諸人無始劫來未曾離此一念心還知麼你許多時來這一念心還曾暫歇也無未嘗有一時暫歇所以六道輪回動經塵劫不復人身只為這一念心不歇今生既得出頭來又得在袈裟之下多少省徑不被業障所拘正好修行如今教諸人修行作麼生修行莫是教諸人用心學佛法麼莫是教諸人體究古今因緣下問下答麼莫是教諸人作福結緣麼這裡也不要諸人辦事也不愛你諸人口快會問會答總不如此何況諸人分上都無如此事大意只要諸人休歇去從前所有知見解會若不從息心得一時捨却必不是道賺汝諸人虗費身心究竟總不成事勸你諸人不如休歇去無你用心處但十二時中似一箇癡人去任運騰騰心如虗空相似亦無虗空之量始得無明無暗年去年來無有絲毫佛法身心始得若有一毫許事不忘便是一生虗過所以道學得佛邊事亦是錯用心直須是無事去始得一般去始得然雖如是不妨難得人非但而今自古以來也難得人豈況今時學事兄弟例皆被無知老禿奴引在荒草裡所以道我眼本正因師故邪後生兄弟總為生死事大利濟有情是至千鄉萬里出來行腳參尋善知識及其被無去著底長老指示教他日夜用心學尋言逐句從錯至錯直至如今子子孫孫例皆如此如今你諸人得遇薦福出世為你諸人説如此事大須慶幸如今天下更無説著此事底人不是大言諸仁者你如今但只出得薦福門外便無人説著況也不知有何以老僧平生所見處如今天下人不知若更不開口便成滅門去也諸人既到這裡且不得容易過時自家著眼孔莫教人謾見佛之與祖如同生冤家始得到這裡合作麼生諸兄弟除是不學既若學大須精研不得取次承當容易領解虗度光陰無有實事要得知有此事除是無心別無異路直須是如愚如癡去始得諸仁者從他人道作愚癡沉空滯寂去但無事去五七年久久何有不得者到你得也這回無得之得去任是一切法無有不會者喚作鼎新一處萬法具足爭消得你學然雖如此似今時覔一箇人如此即不可得諸仁者除十二時中似一箇無孔鐵鎚去始得直須三世諸佛一切聖賢覔你蹤迹不著始得但有一絲毫佛法異念鬼神便見得你識得你不見往日雲居弘覺禪師參見洞山悟本大師後入山住菴每月十五須回問訊洞山一日洞山問庵主汝庵中置被煙火飯食如何庵主曰俱無山云每日喫箇甚麼庵主云每日常有賢聖送食來與某甲喫庵主不明被洞山喝云將謂汝是箇人作麼生却如此庵主叉手進前云不知某甲有甚麼過山云若無所作因甚麼感賢聖送食來與汝喫庵主曰某甲在庵中有時思量著和尚言句山云可知是庵主從此歸庵中自備茶食於是賢聖又送食來即不見庵主從此不送來諸上座他古人直待身心如是尚被鬼神見豈況你今時人終日竟夜自瞞龍神土地一一見得你手腳好之與惡伊總識得為你這一念心不忘如今大意只要諸人息却參學底心息却修行底心如一塊頑石頭去如寒灰死火去若能如是却得相應分若不如斯縱你修行六度萬行乃至盡未來際修只得箇報化佛不見云報化非真佛亦非説法者當知不易得如今諸人既到這裡且莫容易過時且學休歇身心向後自不同去若歇得這一念者稍有𬅿子出家分稍有學道分別無用心處設有學得八萬法門百千三昧説得滿龍宮盈海藏去於你分上總無是處所以佛云如吹魚網欲氣滿無有是處學佛法直下不是這箇道理所以祖師門下只是説忘其言息其見及至達磨從西國來既到此土九年面壁不措一詞如今諸人擬作麼解會諸仁者除是息心別無你著力處諸人若能無心去便與諸佛齊肩佛即是箇無心底人若神通妙用一切慧門一切行門一切定門悉皆本來具足不少欠一法不是你修行得底事皆是息心而證諸人既未得如此且體取空劫以前自己事所以云今時人須得大用現前且如諸人喚甚麼作大用莫是見恁麼問著便出來問訊了歸位立或則下棒下喝喚作大用正是野狐精諸人要識大用麼空劫以前底便喚作大用若體得空劫以前事方得大用現前及能於生死界中得其自在不被業障所拘方是見性底人稍有𬅿子佛法身心也你看他得大用底人去住自由有紙衣道者到曹山曹山見便問莫是紙衣道者否云不敢山云作麼生是紙衣下事對云一毬挂體萬法皆如山云作麼生是紙衣下用紙衣近前唱一聲喏便立脫去時有僧舉到僧堂中有第二座聞得亦脫去良久紙衣却回來問曹山云靈覺不托胎時如何山云不得妙紙衣云如何是妙山云不借借紙衣禮謝曹山畢却歸僧堂坐脫去諸仁者此箇人始得大用現前只如諸人還得大用現前也無若未得大用現前直須是休歇去始得無你用心處只有休心是名第一參學若得一念無心三界內覔你不得天堂地獄收攝你不得如虗空無有處所為甚如此只為你忘却一念心去乃至三世諸佛一切聖賢亦不知你去處豈況六道四生應是覔你不著他有底暫時息心便得相應去有底三年五年十年二十年始得相應看今時兄弟大難得大事相應雖則道我生死事大是乃行腳參學且如你諸兄弟十二時中在甚麼處行履一片身心在那裡要學這箇事也須是箇不拋棄身心學始得作麼生是身心不拋棄十二時中無一念心生喚作不拋棄道此人身心在似這箇人千萬人中覔一人不可得所以道如人常在家不愁家中事不辦然雖如此且無一人肯如今若實有人肯恁麼去老僧與伊𮞏洗腳水所以古德云四事供養敢辭勞萬兩黃金亦銷得諸仁者莫道萬兩黃金你便日將四世界成金也即銷得你底喚作最上之士所以古人道若一人肯恁麼去天上人間最難得此人純一無雜堪為法器今時參學兄弟終不肯如此道落空去只然向言句外馳求覔解會且要得解問解答又被諸方老禿好無所識了亂教壞人家男女引去淫坊裏口相淫道我指示後人要人喚作長老覔出身處似這般徒黨喚作淫婦人是甚麼出家人當初祖師豈是不如你洎乎到此土並不弄著這一副當他豈是無機無智無見解口裏無可説只為無益後人所以九年只麼面壁坐殊不措一詞據諸人分上更莫要別人説説著堪做什麼須是自家回光返照看是什麼道理老僧雖然為諸人説如此事也須是諸人心相委悉始得若不相委悉任運難為湊泊兼也由你當人信得及始得此為難信之法為甚麼難信這裡應無一言半句教諸人領解亦無一箇消息與諸人只要諸人扣己而參老僧這裡若有纖毫佛法知見教諸人作解會如穿諸人鼻孔繫著露柱須是具眼始得若自眼明老僧瞞汝不得須是自家著眼孔莫受人謾學佛法究竟也別無事却須是自信得及始得到汝信得及也一切萬法惑汝不動身心自然堅實去喚作向去底心三世諸佛也喚你不回去諸仁者事各在你當人老僧這裡所説亦不相賺可謂誠實之言只恐信不及若信得及但自休心去三年五年只如諸人從無始以來六趣輪回動經塵劫尚自過得如今教你息心五七年終是不肯有甚麼救處如今天下覔一箇無心底人直是無莫道無心人便休心者亦無起心動念學佛法者如沙無一人悟道見性當知是難得一二百年來不聞人説著此事相引入邪路上去千生百生只恁麼虗過去若據諸人自己事本來無有欠少只是諸人起心動念了自生間隔自相違背似這箇事不在你功行得亦不在你息心得總不與麼説箇一切成現亦是頭上安頭豈説生心動念推求言句不見道擬心即差動念即乖如今諸兄弟但學無心去若得無心自然知有去到你一念相應也三世諸佛覔你蹤迹不得去一切處安著你不得也這回佛也不知你祖亦不知你有甚麼奈得你何所以道這箇人如似大蟲極惡更插翅翼有甚麼抵當處三世諸佛去他前頭無出身之路作麼敢向伊面前開口總踏祖佛頭上行喚作法身出纏如師子王金鎖不繫為箇甚麼為達出世之道便能證明得三世諸佛印可天下祖師自家一身獨脫猶間法界之內有情無情齊成正覺這回一切衆生因你一人悟道力一切罪障悉皆消滅劃時解脫從此永不入三塗長生人天受勝妙樂究竟成佛你道把你諸人作用還如此得也無十地菩薩度人尚有分限若是他悟道底人度人無數無有窮盡諸仁者出家人各各有如此不可思議解脫力只是諸人力所搆不及了所以不知有時常勸諸兄弟你若自己事未辦有甚麼心情學他佛法有甚麼心情廣求知解且須體取空劫以前事到你體得空劫以前事了你自會修行去自會保任去不消你把捉身心你自然與麼去所以云但得其本其末自至爭消得你勞神求覔解會汝諸人自己分上事覔不得捨不得須是無取捨底身心始得直須是凡聖情盡己見亦忘始得這箇喚作過量人知有從上事應是不與你一問一答似這箇方有𬅿子佛法身心諸仁者一等是出家一等是參學莫虗度光陰時不待人各自了取莫待揮霍怕怖慞惶未有去處恁時難為整理腳手自家著力作麼生著力十二時中似一塊頑石去此便是諸人著力處搆取空劫以前事這裡無你做作處所以老僧如此即當與諸人説話蓋為諸人信根淺劣所以不免東語西話他古人那裡如此一一要別人説才知如此便能休歇去更不能回𮨇如寒灰死火枯木石頭去僧堂裏展開單了忘却受飯受得飯來忘却喫所以髮長無心剃衣破無心補一切時中直得東西不辨你我不分此箇人始得有𬅿子出家氣息從上古人參學不於言句中參悟諸仁者事在當人自己不在別人心裏但離却一切文字語言於自己分上撿點來看是甚麼道理若向這裏撿點得出去不被祖佛瞞然雖如是也須親證始得切須辨取是非第一不得取次承當如未相應且休歇去每日起來衣食自在不著用心有一切人供給你正好與麼去也但一切無心去也不消得結緣作福總無實義便是日供養得恆沙諸佛亦不消供養日造得恆沙寶塔亦不用造是甚麼間事為小因緣妨於大事直下便休更莫思前慮後便恁麼去以後佛也不奈你何去老僧雖然晨朝上堂晚間方丈裏小參苦口勸兄弟説話終無一言半句與諸人領解任你走上走下終無一箇消息與人只要得諸人休去歇去所以佛云息心達本悟無為法諸仁者便是佛也只恁麼説也信得及去便恁麼行持信不及去非但老僧三世諸佛亦救你不得珍重師入室云夜來因為諸兄弟舉雲門和尚廊下行次至三門下見一頭水牯牛時有衆僧在彼雲門云水牯牛年多少彼時僧衆皆罔測雲門云汝等但問老僧代為你道時有僧出來問水牯牛年多少門云六十三次舉陳操尚書知睦州乃參睦州和尚一日尚書去遲到彼乃云今日為衆打毬所以來晚州云人打毬馬打毬書云馬打毬州云人還困也無書云困州云馬還困也無書云困州云露柱𠰚書無語即便下去一夜坐臥不安心忙腹熱三更忽然有箇入處即待天明便上方丈見和尚乃曰夜來承和尚慈悲垂示一則語某甲于時無語祗對和尚如今有一則語也州乃云人打毬馬打毬書云馬打毬州云人還困否書云困州云馬還因否書云困州云露柱書云困州便休去諸上座你道是甚麼道理夜來如是舉此兩般因緣教諸人體究來看今日恰見兄弟來吐消息若據如此總未是這裏也別是箇見處未合得雲門和尚問水牛意亦未合得睦州和尚打毬意在為甚麼如此到了只是上座見不到這箇田地在未識得萬法元由在諸仁者出家人若覷這般事不透時夕何安即被燈籠露柱欺謾去也被僧堂佛殿籠去也然雖如是直饒見得一一諦當分明在衲僧分上猶總喚作癡狂外邊走總喚作影像邊事與你自己更無交涉阿你如今認得本源也是沒量大人認得了莫以為事且拈向一邊著須是體取空劫以前事始得若只恁麼便休去成得箇甚麼邊事在諸人若識得水牯牛非但水牯牛乃至山河大地師資父母三世諸佛一切聖賢一時識得方得天地同根萬法一體若不識得水牯牛乃至每日聚會師資父母一切聖賢總不識去為箇甚麼為你見不到未識得三界唯心萬法唯識一切有為諸法總不識去不識萬法元由去所以云亦復不知何者是火何者為舍云何為失但東西馳走視父而已諸仁者直須且學了取這般事所以諸聖云欲證無生理當了現前因此事是粗淺底法門若見不到成甚麼出家作麼生學佛法何以為你不了目前諸法被外境所惑從上古人亦多方便垂示後來向你道心如工畫師能畫諸世間之法諸法所生唯心所現無一法不從你心所現皆是汝心畫成無有一法自然建立諸仁者到這裏合作麼生等間無事將古人言句翻覆體究看是什麼道理此事甚許你用心學得日夜推窮將去無有不會者得了莫將為事始得且是了得一般事若是祖師門下猶隔一重關往日趙州和尚侍者報云大王來也州起立祗揖云大王萬福侍者云未在三門下也州云又道來也諸仁者是箇甚麼道理且道趙州和尚彼時還識趙王也無還見得麼每日諸兄弟如此浩浩地上來這裏忽若問著他繩床近日如何無箇兄弟向這裏下一轉語當知不易諸仁者況此事是箇甚麼漸次在尚乃百十人中無一兩人見到雖則如此假饒你一一見得了了分明去在諸仁者自己分上暨箇甚麼在總喚作認影為頭與你自己了無交涉然雖如此若能覷得破衲僧門下許你具一隻眼參珍重偈頌知見謠莫莫莫大丈夫何太錯無端咀嚼野狐涎滿肚知見無處著縱然成現夢還家物外超然謾斟酌重玄權要騁縱橫逆順機鋒過電爍恰如狂鬼亂心神又似良人中毒藥審須聽急吐却熱病覺來方索索不論日本與西天説甚須彌頭倒卓徒將管見自欺瞞枉把禪流眼睛忠言逆耳為童蒙作者聞之任貶剝莫莫莫開口向君早是錯又更問莫莫莫琉璃瓶貯穢惡甘露味變毒藥莫莫莫荊棘林裏野狐狸走出荒郊又被縛淨地上死尸橫路著天魔外道頭卓朔莫莫莫三世諸佛鼻孔長六代祖師眼皮薄矢上加尖尖更尖一任嘍囉空戲謔十萬八千臾鄯那爭似儂家莫莫莫師有頌與官人一片白雲去復來兩片白雲來復去白雲來去幾千回豁達虗空無所住無所住赴感隨緣還有據殷勤為報道中人佛與衆生無異路牧牛歌起去來天欲曉披蓑戴笠傍門闌騎得牯牛入荒草東西南北盡他遊老懶青黃一任咬日已高牛已飽蘆笛橫吹歸去好麥飯酸漿恣意餐摩挲觜口和衣倒回法嗣弟子若真師子兒方能師子吼百獸盡潛蹤象王亦奔走匝地布風霜滿天麗星斗胡為何理耶三目又益口官人乞頌路僻遊人少山高石像間朝賢如借問遙指白雲間與范文正公丈夫各負沖天氣莫認虗名汙自身撒手直須千聖外纖毫不盡眼中塵辭世天地本同根鳥飛空有迹雪伴老僧行須彌撼金錫乙酉冬至四靈光一點赤珍重會中人般若波羅蜜饒州薦福承古禪師操行高潔稟性虗明參大光敬玄禪師乃曰祇是箇草裏漢遂參福嚴雅和尚又曰祇是箇脫灑衲僧由是終日默然深究先德洪規一日覽雲門語忽然發悟自此韜藏不求名聞棲止雲居弘覺禪師塔所四方學者奔湊因稱古塔主也景祐四年范公仲淹出守鄱陽聞師道德請居薦福開闡宗風僧問大善知識將何為人師曰莫曰恁麼則有問有答去也師曰莫問青青翠竹盡是真如鬱鬱黃花無非般若如何是般若師曰黃泉無老少曰春來草自青師曰聲名不朽曰若然者碧眼胡僧也皺眉師曰退後三步僧曰苦師云吽吽問臨濟舉拂學人舉拳是同是別師曰訛言亂衆曰恁麼則依令而行也師曰天涯海角問一喝分賓主照用一時行此意如何師曰乾柴濕茭僧便喝師曰紅𦦨炎天上堂夫出家者為無為法無為法中無利益無功德近來出家人貪著福慧與道全乖若為福慧須至明心若要達道無汝用心處所以常勸諸人莫學佛法但自休心利根者畫時解脫鈍根者或三五年遠不過十年若不悟去老僧與你入拔舌地獄參五燈嚴統第十六卷昔有一老宿住菴於門上書心字於窗上書心字於壁上書心字法眼云門上但書門字窗上但書窗字壁上但書壁字玄覺云門上不要書門字窗上不要書窗字壁上不要書壁字何故字義炳然五燈嚴統第十六卷未詳法嗣題古塔主論三玄三要法門古塔主著論呵諸方但解知見未明道眼豫初駭之及觀其論三玄三要之義援引諸家證左甚明而曰豈特臨濟用此法門殆是三世如來之法式也僧輒問曰師論三玄法門名既有三其語亦異切不相離而臨濟本曰一句中具三玄一玄中具三要有玄有要何以辨明之古氣索良久引金剛般若經云一切諸佛及諸佛阿耨多羅三藐三菩提法皆從此經出又首楞嚴云於一毫端現寶王剎坐微塵裡轉大法輪等義對之曰理性無邊事相無邊雜而不參混而不一何疑一句之中不具三玄三要耶豫獨不曉金剛般若首楞嚴等義非知見乎且諸經之旨既具臨濟安得蹤迹之而建立哉古方呵知見而自語相違可笑也盤山寶積禪師曰道本無體因道而求名道本無名因名而立號若言即心即佛今時未入玄微若言非心非佛猶是指蹤之極則向上一路千聖不傳學者勞形如猿捉影盤山蓋形容三玄三要者雲居云譬如獵犬尋香嗅迹而去忽若羚羊挂角時莫道迹香亦無矣同安曰涅槃城裡尚猶危陌路相逢勿定期權挂垢衣云是佛却裝珍御復名誰木人夜半穿靴去石女天明戴帽歸萬古碧潭空界月再三撈摝始應知又形容盤山之語而三玄三要之旨益微矣古乃又引教乘以解釋之吾無以徵其失將撼臨濟起而使痛叱之乃快也題古塔主兩種自己僧承古與施祕丞論自己有二曰有空劫時自己有今時日用自己學者以其有叢林時舉讀之疑怖曰豈一阿難而成兩佛耶余聞世尊於首楞嚴會上謂阿難曰譬如琴瑟箜篌琵琶雖有妙音若無妙指終莫能發寶覺真心各各圓滿如我按指海印發光汝暫舉心塵勞先起其説不過以善用不善用為異不聞析而為兩種也而古公立二自己過矣祖師之門其論法方徵言語之際略滯疑似者隨而救之如鳥飛空弗住弗著如六祖謂永嘉曰汝甚得無生之意對曰無生豈有意耶又問讓公什麼物與麼來對曰説似一物即不中自是觀之古蓋吾法中罪人而自以能嗣雲門其自欺欺人之狀不窮而自露也右二段出于石門文字禪第二十五卷
