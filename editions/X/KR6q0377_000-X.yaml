body:
  text: 前序靈源叟惟清禪師即所謂古塔主者也淨行無垢孤風絕攀名重當年誠非虗得垂機接物深指悟中語直標宗世多參究然判兩篇自已列三要三玄類聚因緣品題緇素與夫不見雲門而公稱嫡嗣情猜之士或致譏評是猶循器定空刻舟尋劒親逢大藥反益沉痾儻善退思歷然神會則知彼上人者豈徒然哉禪者道宣竦聞通辯請將其錄鏤板流傳仍乞斯言為之冠引實紹聖四年中秋日也雲門村叟妙喜宗禪無傳授可傳授者教乘文字先德語言而已非心之至妙也其至妙之心貴不越一念而契證苟如實契證則教乘文字先德語言無少無剩皆此心之妙用如柝旃檀片片匪異故曰教外別傳不立文字直指人心見性成佛此萬世不易之論近日叢林誑妄說法之流不信有妙悟而專事教乘文字先德語言尋章摘句狐媚學者傳襲以為家寶或以隻履西歸之話為末後大事或以五位功勳偏正回互為箕裘各立門戶各秉師承謂之宗旨觀斯之說何異群虱之處裩中逃乎深縫匿乎壞絮自以為吉宅炎丘火流燋邑滅都群虱裩中不能出此之謂也臨際曰有一種不識好惡向教乘中取意度商量成於句義如把屎塊子口中味了却吐過與人三復斯言未嘗不喟然嘆息也嗚呼安得此老復出為後進針膏肓起癈疾乎
